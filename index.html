<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Interactive audiovisual experiments by Charlie Groves." />
    <meta name="theme-color" content="#000000" />
    <meta property="og:title" content="Charlie Groves" />
    <meta property="og:type" content="website" />
    <title>Charlie Groves</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      .boot { position: fixed; inset: 0; z-index: 1000; display: grid; place-items: center; overflow: hidden; background: #000; color: #fff; font-family: Arial, sans-serif; transition: opacity .65s ease, visibility .65s; }
      body[data-ready="true"] .boot { opacity: 0; visibility: hidden; }
      .boot__field { position: absolute; width: min(76vw, 760px); aspect-ratio: 1.5; filter: blur(.2px); transform: rotate(-4deg); }
      .boot__field i { position: absolute; inset: calc(var(--i) * 3.2%); border: 1px solid hsla(calc(278 + var(--i) * 5), 100%, 68%, calc(.13 + var(--i) * .018)); transform: perspective(540px) rotateX(58deg) rotateZ(calc(var(--i) * 3deg)) translate3d(calc(sin(var(--i)) * 8px), 0, calc(var(--i) * -7px)); animation: boot-pulse 2.8s ease-in-out infinite alternate; animation-delay: calc(var(--i) * -90ms); }
      .boot__glow { position: absolute; width: min(64vw, 620px); aspect-ratio: 1.5; border-radius: 50%; background: radial-gradient(circle at 38% 54%, rgba(222, 55, 255, .32), rgba(71, 255, 180, .18) 34%, transparent 68%); filter: blur(30px); animation: boot-drift 3.4s ease-in-out infinite alternate; }
      .boot__label { position: relative; text-align: center; text-shadow: 0 0 18px #000; }
      .boot__label strong { display: block; font-size: 1.25rem; letter-spacing: -.04em; }
      .boot__label span { display: block; margin-top: .55rem; color: rgba(255,255,255,.58); font-size: .68rem; letter-spacing: .18em; text-transform: uppercase; }
      @keyframes boot-pulse { to { transform: perspective(540px) rotateX(58deg) rotateZ(calc(var(--i) * 3deg + 8deg)) translate3d(10px, -5px, calc(var(--i) * -7px)); border-color: hsla(calc(278 + var(--i) * 7), 100%, 72%, .42); } }
      @keyframes boot-drift { to { transform: translate3d(5%, -4%, 0) scale(1.12); filter: blur(45px); } }
      @media (prefers-reduced-motion: reduce) { .boot__field i, .boot__glow { animation: none; } }
    </style>
  </head>
  <body>
    <div class="boot" aria-label="Loading">
      <div class="boot__glow"></div>
      <div class="boot__field" aria-hidden="true">
        <i style="--i: 0"></i><i style="--i: 1"></i><i style="--i: 2"></i>
        <i style="--i: 3"></i><i style="--i: 4"></i><i style="--i: 5"></i>
        <i style="--i: 6"></i><i style="--i: 7"></i><i style="--i: 8"></i>
        <i style="--i: 9"></i><i style="--i: 10"></i><i style="--i: 11"></i>
      </div>
      <div class="boot__label"><strong>charlie</strong><span>loading experience</span></div>
    </div>

    <main class="stage" data-stage></main>
    <aside class="prompt" data-prompt hidden>
      <button class="prompt__content" data-prompt-content type="button">
        <strong data-prompt-title></strong>
        <span data-prompt-subtitle></span>
      </button>
    </aside>
    <nav class="controls" aria-label="Experience navigation">
      <button class="next" data-next type="button">Next</button>
    </nav>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
